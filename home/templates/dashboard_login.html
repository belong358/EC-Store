{% load static %}
<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — EleStore Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --red: #d10024; --red-dark: #a8001d;
        --sidebar: #0f1117; --card: #171a23; --border: rgba(255,255,255,.08);
        --text: #fff; --muted: rgba(255,255,255,.4);
        --font: "Be Vietnam Pro", sans-serif;
      }
      html, body { height: 100%; }
      body {
        font-family: var(--font);
        background: radial-gradient(circle at 20% 20%, #1a1d29 0%, var(--sidebar) 55%);
        color: var(--text);
        display: flex; align-items: center; justify-content: center;
        min-height: 100vh; padding: 20px;
      }

      .login-wrap { width: 100%; max-width: 380px; }

      .brand { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 28px; }
      .logo-icon {
        width: 50px; height: 50px; background: var(--red); border-radius: 13px;
        display: flex; align-items: center; justify-content: center; font-size: 22px; color: #fff;
        box-shadow: 0 8px 24px rgba(209,0,36,.35);
      }
      .brand-text { text-align: center; }
      .brand-text .name { font-size: 19px; font-weight: 800; color: #fff; letter-spacing: .2px; }
      .brand-text .sub { font-size: 11.5px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }

      .card {
        background: var(--card); border: 1px solid var(--border); border-radius: 16px;
        padding: 30px 28px; box-shadow: 0 20px 50px rgba(0,0,0,.35);
      }
      .card h1 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 4px; }
      .card p.hint { font-size: 12.5px; color: var(--muted); margin-bottom: 22px; }

      .flash {
        padding: 10px 14px; border-radius: 9px; font-size: 12.5px; font-weight: 500;
        margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        background: rgba(209,0,36,.12); color: #ff8a98; border: 1px solid rgba(209,0,36,.3);
      }
      .flash i { flex-shrink: 0; }

      .form-group { margin-bottom: 16px; }
      .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
      .input-wrap { position: relative; display: flex; align-items: center; }
      .input-wrap i.fld-icon { position: absolute; left: 14px; color: var(--muted); font-size: 13px; }
      .input-wrap input {
        width: 100%; height: 44px; background: rgba(255,255,255,.04); border: 1px solid var(--border);
        border-radius: 9px; color: #fff; font-size: 13.5px; font-family: var(--font);
        padding: 0 42px; outline: none; transition: border-color .2s, background .2s;
      }
      .input-wrap input::placeholder { color: rgba(255,255,255,.25); }
      .input-wrap input:focus { border-color: var(--red); background: rgba(255,255,255,.06); }
      .toggle-pw { position: absolute; right: 14px; color: var(--muted); cursor: pointer; font-size: 13px; }
      .toggle-pw:hover { color: #fff; }

      .btn-submit {
        width: 100%; height: 46px; background: var(--red); color: #fff; border: none; border-radius: 9px;
        font-family: var(--font); font-size: 14px; font-weight: 700; cursor: pointer;
        display: flex; align-items: center; justify-content: center; gap: 8px;
        margin-top: 6px; transition: background .2s;
      }
      .btn-submit:hover { background: var(--red-dark); }
    </style>
  </head>
  <body>

    <div class="login-wrap">
      <div class="brand">
        <div class="logo-icon"><i class="fa fa-bolt"></i></div>
        <div class="brand-text">
          <div class="name">EleStore</div>
          <div class="sub">Admin Panel</div>
        </div>
      </div>

      <div class="card">
        <h1>Đăng nhập</h1>
        <p class="hint">Khu vực dành riêng cho quản trị viên hệ thống</p>

        {% if messages %}
          {% for message in messages %}
            <div class="flash"><i class="fa fa-circle-exclamation"></i> {{ message }}</div>
          {% endfor %}
        {% endif %}

        <form action="" method="post">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ next }}">

          <div class="form-group">
            <label>Tên đăng nhập</label>
            <div class="input-wrap">
              <i class="fa fa-user fld-icon"></i>
              <input type="text" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
            </div>
          </div>

          <div class="form-group">
            <label>Mật khẩu</label>
            <div class="input-wrap">
              <i class="fa fa-lock fld-icon"></i>
              <input type="password" name="password" id="dash_password" placeholder="Nhập mật khẩu" required>
              <span class="toggle-pw" onclick="toggleDashPw()"><i class="fa fa-eye-slash" id="dash_pw_icon"></i></span>
            </div>
          </div>

          <button type="submit" class="btn-submit">Đăng nhập <i class="fa fa-arrow-right"></i></button>
        </form>
      </div>
    </div>

    <script>
      function toggleDashPw() {
        var input = document.getElementById('dash_password');
        var icon = document.getElementById('dash_pw_icon');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash');
        }
      }
    </script>
  </body>
</html>
