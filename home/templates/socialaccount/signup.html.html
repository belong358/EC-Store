{% load i18n %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Đang đăng nhập...</title>
  <style>
    body{font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;background:#f4f6fb}
    .box{text-align:center}
    .spinner{width:40px;height:40px;border:4px solid #eee;border-top-color:#d10024;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    p{color:#555;font-size:14px}
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Đang kết nối tài khoản Google...</p>
    <form id="autoForm" method="post" action="{% url 'socialaccount_signup' %}">
      {% csrf_token %}
      {{ form.as_p }}
    </form>
  </div>
  <script>setTimeout(function(){ document.getElementById('autoForm').submit(); }, 300);</script>
</body>
</html>
